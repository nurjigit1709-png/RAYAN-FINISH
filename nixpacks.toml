[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/db run push",
  "NODE_ENV=production BASE_PATH=/ PORT=8080 pnpm --filter @workspace/rayan-hotel run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production PORT=${PORT:-8080} node ./artifacts/api-server/dist/index.mjs"

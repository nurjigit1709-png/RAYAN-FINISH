openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Rayan Hotel Archive API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: folders
    description: Folder management
  - name: files
    description: File management
  - name: logs
    description: Activity logs
  - name: categories
    description: Custom sidebar categories
  - name: dashboard
    description: Dashboard summary data
  - name: chat
    description: Team messaging

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /users/{id}/block:
    patch:
      operationId: toggleBlockUser
      tags: [users]
      summary: Block or unblock user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockUserInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /folders:
    get:
      operationId: listFolders
      tags: [folders]
      summary: List folders
      parameters:
        - name: parentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Folder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"

  /folders/{id}:
    get:
      operationId: getFolder
      tags: [folders]
      summary: Get folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Update folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List files
      parameters:
        - name: folderId
          in: query
          schema:
            type: ["integer", "null"]
        - name: search
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileRecord"

  /files/{id}:
    get:
      operationId: getFile
      tags: [files]
      summary: Get file metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileRecord"
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /logs:
    get:
      operationId: listLogs
      tags: [logs]
      summary: List activity logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List custom sidebar categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a custom sidebar category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-files:
    get:
      operationId: getRecentFiles
      tags: [dashboard]
      summary: Get recent files
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileRecord"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLog"

  /chat/conversations:
    get:
      operationId: listConversations
      tags: [chat]
      summary: List conversations with all colleagues
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /chat/messages:
    get:
      operationId: listMessages
      tags: [chat]
      summary: Get messages with a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/messages/{id}/read:
    patch:
      operationId: markMessageRead
      tags: [chat]
      summary: Mark message as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, name, role, isBlocked, isPremium, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [super_admin, manager, employee, programmer]
        isBlocked:
          type: boolean
        isPremium:
          type: boolean
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [email, name, password, role]
      properties:
        email:
          type: string
        name:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [super_admin, manager, employee, programmer]
        isPremium:
          type: boolean

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: ["string", "null"]
        role:
          type: string
          enum: [super_admin, manager, employee, programmer]
        isPremium:
          type: boolean

    BlockUserInput:
      type: object
      required: [isBlocked]
      properties:
        isBlocked:
          type: boolean

    Folder:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        parentId:
          type: ["integer", "null"]
        categoryId:
          type: ["integer", "null"]
        createdAt:
          type: string
        fileCount:
          type: integer

    FolderInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        parentId:
          type: ["integer", "null"]
        categoryId:
          type: ["integer", "null"]

    FolderUpdate:
      type: object
      properties:
        name:
          type: string
        parentId:
          type: ["integer", "null"]

    FileRecord:
      type: object
      required: [id, name, mimeType, size, uploadedBy, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        size:
          type: integer
        folderId:
          type: ["integer", "null"]
        uploadedBy:
          type: integer
        uploaderName:
          type: ["string", "null"]
        createdAt:
          type: string

    ActivityLog:
      type: object
      required: [id, action, userId, createdAt]
      properties:
        id:
          type: integer
        action:
          type: string
          enum: [upload, download, delete, login, logout, create_folder, delete_folder, create_user, delete_user, block_user]
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        fileId:
          type: ["integer", "null"]
        fileName:
          type: ["string", "null"]
        folderId:
          type: ["integer", "null"]
        folderName:
          type: ["string", "null"]
        createdAt:
          type: string

    Category:
      type: object
      required: [id, name, icon, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        createdAt:
          type: string

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        icon:
          type: string

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string

    DashboardStats:
      type: object
      required: [totalFiles, totalFolders, totalUsers, totalSize, uploadedToday]
      properties:
        totalFiles:
          type: integer
        totalFolders:
          type: integer
        totalUsers:
          type: integer
        totalSize:
          type: integer
        uploadedToday:
          type: integer
        recentUploads:
          type: integer

    Conversation:
      type: object
      required: [userId, userName, userRole, unreadCount]
      properties:
        userId:
          type: integer
        userName:
          type: string
        userRole:
          type: string
        lastMessage:
          type: ["string", "null"]
        lastFileId:
          type: ["integer", "null"]
        lastFileName:
          type: ["string", "null"]
        unreadCount:
          type: integer
        lastMessageAt:
          type: ["string", "null"]

    ChatMessage:
      type: object
      required: [id, senderId, receiverId, isRead, createdAt, senderName]
      properties:
        id:
          type: integer
        senderId:
          type: integer
        receiverId:
          type: integer
        senderName:
          type: string
        content:
          type: ["string", "null"]
        fileId:
          type: ["integer", "null"]
        fileName:
          type: ["string", "null"]
        fileMimeType:
          type: ["string", "null"]
        fileSize:
          type: ["integer", "null"]
        isRead:
          type: boolean
        createdAt:
          type: string

    SendMessageInput:
      type: object
      properties:
        receiverId:
          type: integer
        content:
          type: ["string", "null"]
        fileId:
          type: ["integer", "null"]
